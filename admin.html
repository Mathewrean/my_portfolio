<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="repo-base-path" content="/my_portfolio" />
  <meta http-equiv="Cache-Control" content="max-age=0, no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>Admin · Mathewrean Portfolio</title>
  <meta name="description" content="Admin dashboard for Mathewrean's cybersecurity portfolio." />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://api.github.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'" />
  <link rel="stylesheet" href="assets/css/main.css" />
  <script defer src="assets/js/admin.js"></script>
</head>
<body>
  <button id="themeToggle" class="floating-theme-toggle" aria-label="Toggle dark and light mode">◐</button>
  <aside class="sidebar admin-sidebar">
    <div class="sidebar-brand">
      <h1>Portfolio Admin</h1>
      <p>Mathewrean</p>
    </div>
    <nav class="sidebar-nav" aria-label="Admin sections">
      <button class="admin-nav-btn active" data-panel="profile">Profile</button>
      <button class="admin-nav-btn" data-panel="resume">Resume</button>
      <button class="admin-nav-btn" data-panel="certificates">Certificates</button>
      <button class="admin-nav-btn" data-panel="projects">Projects</button>
      <button class="admin-nav-btn" data-panel="challenges">Challenges</button>
      <button class="admin-nav-btn" data-panel="research">Research</button>
      <button class="admin-nav-btn" data-panel="gallery">Gallery</button>
      <button class="admin-nav-btn" data-panel="contact">Contact</button>
    </nav>
  </aside>
  <main class="content admin">
    <section class="admin-panel active" data-panel="profile">
      <div class="admin-panel-grid">
        <article class="panel preview-panel" id="profilePreview">
          <h2>Current profile</h2>
          <div id="profileCurrent" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Edit profile</h2>
          <form id="profileForm" class="form-grid">
            <label>Name<input name="name" required /></label>
            <label>Tagline<input name="tagline" /></label>
            <label>Eyebrow<input name="eyebrow" /></label>
            <label>Summary<textarea name="summary" rows="2"></textarea></label>
            <label>About<textarea name="about" rows="3"></textarea></label>
            <label>Contact (JSON)<textarea name="contact" rows="3"></textarea></label>
            <button type="submit" class="btn btn-primary">Save profile</button>
          </form>
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="resume">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Highlights</h2>
          <div id="resumePreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Edit resume</h2>
          <textarea id="resumeEditor" rows="12"></textarea>
          <div class="toolbar">
            <button id="saveResume" class="btn btn-primary">Save resume</button>
          </div>
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="certificates">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Certificates</h2>
          <div id="certPreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Add / edit certificate</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="projects">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Projects</h2>
          <div id="projectPreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Add / edit project</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="challenges">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Challenges</h2>
          <div id="challengePreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Add / edit challenge</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="research">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Research</h2>
          <div id="researchPreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Add / edit research</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="gallery">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Gallery</h2>
          <div id="galleryPreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Add / edit gallery image</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
    <section class="admin-panel" data-panel="contact">
      <div class="admin-panel-grid">
        <article class="panel preview-panel">
          <h2>Contact links</h2>
          <div id="contactPreview" class="preview-stack"></div>
        </article>
        <article class="panel form-panel">
          <h2>Edit contact info</h2>
          <!-- form placeholder -->
        </article>
      </div>
    </section>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
</body>
</html>
